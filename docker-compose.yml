# ══════════════════════════════════════════════════════════════
# SDM Headless Enterprise — Docker Compose (TASK_H02)
# Full-stack: Express API + React SPA + Cloudflare Tunnel
# WOLF-002: Named volume ensures JSON DB persists across rebuilds
# ══════════════════════════════════════════════════════════════

services:
  sdm-enterprise:
    container_name: sdm-headless-enterprise
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8095:8090"
    environment:
      - NODE_ENV=production
      - PORT=8090
      - DB_DRIVER=pg
      - DATABASE_URL=postgresql://cerberus:cerberus_sovereign_2026@db-node:5432/cerberus_brain
      - SDM_API_KEY=${SDM_API_KEY:-sdm-enterprise-key-2026}
      - SDM_API_URL=${SDM_API_URL:-https://ops.rxfit.ai}
      - GIT_AUTO_SYNC=${GIT_AUTO_SYNC:-false}
      - GIT_REMOTE_URL=${GIT_REMOTE_URL:-}
      - GOOGLE_SHEET_ID=${GOOGLE_SHEET_ID:-}
      - GOOGLE_CREDENTIALS_PATH=${GOOGLE_CREDENTIALS_PATH:-}
      - CONCIERGE_API_URL=${CONCIERGE_API_URL:-}
      - CONCIERGE_API_KEY=${CONCIERGE_API_KEY:-}
      - NOTIFICATION_EMAIL=${NOTIFICATION_EMAIL:-}
      - GOOGLE_CHAT_WEBHOOK=${GOOGLE_CHAT_WEBHOOK:-}
    volumes:
      # WOLF-002: Persist JSON database across container restarts  
      - sdm-enterprise-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8090/api/v1/health | grep -q '\"status\":\"healthy\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - cerberus-mesh
    labels:
      - "com.rxfit.service=sdm-headless-enterprise"
      - "com.rxfit.tier=core"

  # T15: sdm-cloudflared removed — tunnel ingress consolidated into cerberus-gateway
  # See docker-compose.orchestrator.yml for the unified gateway service.

volumes:
  sdm-enterprise-data:
    name: sdm-enterprise-data
    # External: true if you want to use an existing volume
    # external: true

networks:
  cerberus-mesh:
    external: true
    name: cerberus-mesh
